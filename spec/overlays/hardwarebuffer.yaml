module: hardwarebuffer

package:
  go_name: hwbuf
  go_import: github.com/AndroidGoLab/ndk/hwbuf
  doc: "Package hwbuf provides Go bindings for Android HardwareBuffer."

types:
  AHardwareBuffer:
    go_name: Buffer
    destructor: AHardwareBuffer_release
    doc: "Buffer represents a hardware-allocated buffer."

  AHardwareBuffer_Desc:
    go_name: Desc
    value_struct: true

  AHardwareBuffer_Format:
    go_name: Format
    strip_prefix: AHARDWAREBUFFER_FORMAT_
    string_method: true

  AHardwareBuffer_UsageFlags:
    go_name: Usage
    strip_prefix: AHARDWAREBUFFER_USAGE_

functions:
  # Buffer lifecycle
  AHardwareBuffer_allocate:
    go_name: Allocate
    output_params:
      outBuffer: "*Buffer"

  AHardwareBuffer_acquire:
    receiver: Buffer
    go_name: Acquire

  AHardwareBuffer_release:
    skip: true

  AHardwareBuffer_describe:
    receiver: Buffer
    go_name: Describe
    output_params:
      outDesc: "*Desc"

  # Buffer access
  AHardwareBuffer_lock:
    receiver: Buffer
    go_name: Lock
    output_params:
      outVirtualAddress: "unsafe.Pointer"

  AHardwareBuffer_unlock:
    receiver: Buffer
    go_name: Unlock

  # Query
  AHardwareBuffer_isSupported:
    go_name: IsSupported
    pure: true

  AHardwareBuffer_recvHandleFromUnixSocket:
    go_name: RecvHandleFromUnixSocket
    output_params:
      outBuffer: "*Buffer"

api_levels:
  AHardwareBuffer_isSupported: 29
