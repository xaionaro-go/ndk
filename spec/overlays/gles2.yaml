functions:
  # State functions
  glClearColor:
    go_name: ClearColor
  glClear:
    go_name: Clear
  glEnable:
    go_name: Enable
  glDisable:
    go_name: Disable
  glViewport:
    go_name: Viewport
  glScissor:
    go_name: Scissor

  # Shader functions
  glCreateShader:
    go_name: CreateShader
  glDeleteShader:
    go_name: DeleteShader
  glShaderSource:
    go_name: ShaderSource
  glCompileShader:
    go_name: CompileShader
  glGetShaderiv:
    go_name: GetShaderiv

  # Program functions
  glCreateProgram:
    go_name: CreateProgram
  glDeleteProgram:
    go_name: DeleteProgram
  glAttachShader:
    go_name: AttachShader
  glLinkProgram:
    go_name: LinkProgram
  glUseProgram:
    go_name: UseProgram
  glGetProgramiv:
    go_name: GetProgramiv

  # Uniform functions
  glGetUniformLocation:
    go_name: GetUniformLocation
  glUniform1f:
    go_name: Uniform1f
  glUniform1i:
    go_name: Uniform1i
  glUniform4fv:
    go_name: Uniform4fv
  glUniformMatrix4fv:
    go_name: UniformMatrix4fv

  # Vertex attribute functions
  glGetAttribLocation:
    go_name: GetAttribLocation
  glEnableVertexAttribArray:
    go_name: EnableVertexAttribArray
  glDisableVertexAttribArray:
    go_name: DisableVertexAttribArray
  glVertexAttribPointer:
