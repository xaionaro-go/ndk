module: gles2

package:
  go_name: gles2
  go_import: github.com/AndroidGoLab/ndk/gles2
  doc: "Package gles2 provides Go bindings for OpenGL ES 2.0."

types:
  GLenum:
    go_name: Enum
    strip_prefix: GL_

  GLbitfield:
    go_name: Bitfield
    strip_prefix: GL_

  GLboolean:
    go_name: Boolean
    strip_prefix: GL_

# Constants from extension headers and core GL not parsed by specgen.
