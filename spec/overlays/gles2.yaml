  glDeleteBuffers:
    go_name: DeleteBuffers
  glBindBuffer:
    go_name: BindBuffer
  glBufferData:
    go_name: BufferData
  glBufferSubData:
    go_name: BufferSubData

  # Texture functions
  glGenTextures:
    go_name: GenTextures
  glDeleteTextures:
    go_name: DeleteTextures
  glBindTexture:
    go_name: BindTexture
  glTexImage2D:
    go_name: TexImage2D
  glTexParameteri:
    go_name: TexParameteri
  glActiveTexture:
    go_name: ActiveTexture

  # Draw functions
  glDrawArrays:
    go_name: DrawArrays
  glDrawElements:
    go_name: DrawElements

  # Framebuffer functions
  glGenFramebuffers:
