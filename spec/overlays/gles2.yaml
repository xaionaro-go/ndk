  glFramebufferTexture2D:
    go_name: FramebufferTexture2D
  glCheckFramebufferStatus:
    go_name: CheckFramebufferStatus

  # Renderbuffer functions
  glGenRenderbuffers:
    go_name: GenRenderbuffers
  glDeleteRenderbuffers:
    go_name: DeleteRenderbuffers
  glBindRenderbuffer:
    go_name: BindRenderbuffer
  glRenderbufferStorage:
    go_name: RenderbufferStorage
  glFramebufferRenderbuffer:
    go_name: FramebufferRenderbuffer

  # Query functions
  glGetError:
    go_name: GetError
  glGetString:
    go_name: GetString
  glGetIntegerv:
    go_name: GetIntegerv
  glFlush:
    go_name: Flush
  glFinish:
    go_name: Finish

  # Blending and depth functions
