module: gles3

package:
  go_name: gles3
  go_import: github.com/xaionaro-go/ndk/gles3
  doc: "Package gles3 provides Go bindings for OpenGL ES 3.0."

types:
  GLenum:
    go_name: GLenum
    strip_prefix: GL_
  GLbitfield:
    go_name: GLbitfield
    strip_prefix: GL_

extra_enums:
  GLenum:
    - name: GL_SYNC_GPU_COMMANDS_COMPLETE
      value: 37143
    - name: GL_ALREADY_SIGNALED
      value: 37146
    - name: GL_TIMEOUT_EXPIRED
      value: 37147
    - name: GL_CONDITION_SATISFIED
      value: 37148
    - name: GL_WAIT_FAILED
      value: 37149
    - name: GL_TRANSFORM_FEEDBACK
      value: 36386
    - name: GL_TRANSFORM_FEEDBACK_BUFFER
      value: 35982
    - name: GL_INTERLEAVED_ATTRIBS
      value: 35980
    - name: GL_SEPARATE_ATTRIBS
      value: 35981
  GLbitfield:
    - name: GL_SYNC_FLUSH_COMMANDS_BIT
      value: 1

