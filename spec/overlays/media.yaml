module: media

package:
  go_name: media
  go_import: github.com/xaionaro-go/ndk/media
  doc: "Package media provides Go bindings for Android Media NDK."

types:
  media_status_t:
    go_error: true
    success_value: AMEDIA_OK
    error_prefix: "media"
    strip_prefix: AMEDIA_ERROR_

  AMediaCodec:
    go_name: Codec
    destructor: AMediaCodec_delete

  AMediaFormat:
    go_name: Format
    constructor: AMediaFormat_new
    destructor: AMediaFormat_delete

  AMediaExtractor:
    go_name: Extractor
    constructor: AMediaExtractor_new
    destructor: AMediaExtractor_delete

  AMediaMuxer:
    go_name: Muxer
    destructor: AMediaMuxer_delete

  AMediaDrm:
    go_name: Drm

  AMediaCrypto:
    go_name: Crypto

functions:
  # --- Codec lifecycle ---
  AMediaCodec_createDecoderByType:
    go_name: NewDecoder
    returns_new: Codec
  AMediaCodec_createEncoderByType:
    go_name: NewEncoder
    returns_new: Codec

  # --- Codec control ---
  AMediaCodec_configure:
    receiver: Codec
  AMediaCodec_start:
    receiver: Codec
  AMediaCodec_stop:
    receiver: Codec
  AMediaCodec_flush:
    receiver: Codec

  # --- Codec buffer operations ---
  AMediaCodec_dequeueInputBuffer:
    skip: true  # returns int32, not Media_status_t
  AMediaCodec_dequeueOutputBuffer:
    skip: true  # returns int32, not Media_status_t; has AMediaCodecBufferInfo param
  AMediaCodec_queueInputBuffer:
    receiver: Codec
  AMediaCodec_releaseOutputBuffer:
    receiver: Codec

  # --- Codec getters ---
  AMediaCodec_getOutputFormat:
    skip: true  # returns *AMediaFormat directly, can't convert capi pointer to idiomatic type

  # --- Format setters ---
  AMediaFormat_setString:
    receiver: Format
    chain: true
  AMediaFormat_setInt32:
    receiver: Format
    chain: true

  # --- Format getters ---
  AMediaFormat_getInt32:
    receiver: Format
    pure: true
  AMediaFormat_getString:
    skip: true  # needs **byte out param

  # --- Extractor operations ---
  AMediaExtractor_setDataSourceFd:
    receiver: Extractor
  AMediaExtractor_getTrackCount:
    receiver: Extractor
    go_name: TrackCount
    pure: true
  AMediaExtractor_getTrackFormat:
    skip: true  # returns *AMediaFormat directly, can't convert capi pointer to idiomatic type
  AMediaExtractor_selectTrack:
    receiver: Extractor
  AMediaExtractor_advance:
    skip: true  # returns bool, not Media_status_t
  AMediaExtractor_readSampleData:
    skip: true  # returns int32 (byte count), not Media_status_t
  AMediaExtractor_getSampleTime:
    receiver: Extractor
    go_name: SampleTime
    pure: true

  # --- Muxer operations ---
  AMediaMuxer_addTrack:
    skip: true  # returns int32 (track index), not Media_status_t
  AMediaMuxer_start:
    receiver: Muxer
  AMediaMuxer_stop:
    receiver: Muxer

extra_enums:
  media_status_t:
    - name: AMEDIA_OK
      value: 0
    - name: AMEDIA_ERROR_UNKNOWN
      value: -10000
    - name: AMEDIA_ERROR_MALFORMED
      value: -10001
    - name: AMEDIA_ERROR_UNSUPPORTED
      value: -10002
    - name: AMEDIA_ERROR_INVALID_OBJECT
      value: -10003
    - name: AMEDIA_ERROR_INVALID_PARAMETER
      value: -10004
    - name: AMEDIA_ERROR_INVALID_OPERATION
      value: -10005
    - name: AMEDIA_ERROR_END_OF_STREAM
      value: -10006
    - name: AMEDIA_ERROR_IO
      value: -10007
    - name: AMEDIA_ERROR_WOULD_BLOCK
      value: -10008
    - name: AMEDIA_DRM_ERROR_BASE
      value: -20000
    - name: AMEDIA_DRM_NOT_PROVISIONED
      value: -20001
    - name: AMEDIA_DRM_RESOURCE_BUSY
      value: -20002
    - name: AMEDIA_DRM_DEVICE_REVOKED
      value: -20003
    - name: AMEDIA_DRM_SHORT_BUFFER
      value: -20004
    - name: AMEDIA_DRM_SESSION_NOT_OPENED
      value: -20005
    - name: AMEDIA_DRM_TAMPER_DETECTED
      value: -20006
    - name: AMEDIA_DRM_VERIFY_FAILED
      value: -20007
    - name: AMEDIA_DRM_NEED_KEY
      value: -20008
    - name: AMEDIA_DRM_LICENSE_EXPIRED
      value: -20009
    - name: AMEDIA_IMGREADER_ERROR_BASE
      value: -30000
    - name: AMEDIA_IMGREADER_NO_BUFFER_AVAILABLE
      value: -30001
    - name: AMEDIA_IMGREADER_MAX_IMAGES_ACQUIRED
      value: -30002
    - name: AMEDIA_IMGREADER_CANNOT_LOCK_IMAGE
      value: -30003
    - name: AMEDIA_IMGREADER_CANNOT_UNLOCK_IMAGE
      value: -30004
    - name: AMEDIA_IMGREADER_IMAGE_NOT_LOCKED
      value: -30005

api_levels:
  AMediaCodec_createDecoderByType: 21
  AMediaCodec_createEncoderByType: 21
  AMediaCodec_delete: 21
  AMediaCodec_configure: 21
  AMediaCodec_start: 21
  AMediaCodec_stop: 21
  AMediaCodec_flush: 21
  AMediaCodec_dequeueInputBuffer: 21
  AMediaCodec_dequeueOutputBuffer: 21
  AMediaCodec_getOutputFormat: 21
  AMediaCodec_queueInputBuffer: 21
  AMediaCodec_releaseOutputBuffer: 21
  AMediaFormat_new: 21
  AMediaFormat_delete: 21
  AMediaFormat_setString: 21
  AMediaFormat_setInt32: 21
  AMediaFormat_getInt32: 21
  AMediaFormat_getString: 21
  AMediaExtractor_new: 21
  AMediaExtractor_delete: 21
  AMediaExtractor_setDataSourceFd: 21
  AMediaExtractor_getTrackCount: 21
  AMediaExtractor_getTrackFormat: 21
  AMediaExtractor_selectTrack: 21
  AMediaExtractor_advance: 21
  AMediaExtractor_readSampleData: 21
  AMediaExtractor_getSampleTime: 21
  AMediaMuxer_new: 21
  AMediaMuxer_delete: 21
  AMediaMuxer_addTrack: 21
  AMediaMuxer_start: 21
  AMediaMuxer_stop: 21
