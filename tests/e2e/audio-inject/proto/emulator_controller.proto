syntax = "proto3";

package android.emulation.control;

option go_package = "github.com/xaionaro-go/ndk/tests/e2e/audio-inject/proto/emupb";

import "google/protobuf/empty.proto";

service EmulatorController {
  // Injects audio packets to the android microphone.
  rpc injectAudio(stream AudioPacket) returns (google.protobuf.Empty) {}
}

message AudioFormat {
  enum SampleFormat {
    AUD_FMT_U8 = 0;
    AUD_FMT_S16 = 1;
  }
  enum Channels {
    Mono = 0;
    Stereo = 1;
  }
  uint64 samplingRate = 1;
  Channels channels = 2;
  SampleFormat format = 3;
}

message AudioPacket {
  AudioFormat format = 1;
  uint64 timestamp = 2;
  bytes audio = 3;
}
